<!DOCTYPE html>
<html>
<head>
    <title>III CS A Timetable</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }

        h3{
            color: white;
            background-color: #2c3e50;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
        }

        table{
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td{
            border: 1px solid black;
            padding: 12px;
            text-align: center;
            font-weight: bold;
        }

        th{
            background-color: #34495e;
            color: white;
        }

        /* Day Column */
        td:first-child{
            background-color: #ffe082;
        }

        /* Subject Colors */
        .se{
            background-color: #ffccbc;
        }

        .cg{
            background-color: #b3e5fc;
        }

        .vc{
            background-color: #dcedc8;
        }

        .wdd{
            background-color: #f8bbd0;
        }

        .devops{
            background-color: #d1c4e9;
        }

        .cyb{
            background-color: #c8e6c9;
        }

        .lab{
            background-color: #fff59d;
        }
    </style>
</head>

<body>

<h3>III CS A</h3>

<table>
    <tr>
        <th>D/O</th>
        <th>1</th>
        <th>2</th>
        <th>3</th>
        <th>4</th>
        <th>5</th>
    </tr>

    <tr>
        <td>I</td>
        <td class="se">SE</td>
        <td class="cg">CG</td>
        <td class="vc">VC/BD</td>
        <td colspan="2" class="wdd">WDD</td>
    </tr>

    <tr>
        <td>II</td>
        <td class="wdd">WDD</td>
        <td class="se">SE</td>
        <td class="cg">CG</td>
        <td class="devops">SBS DevOps</td>
        <td class="se">SE</td>
    </tr>

    <tr>
        <td>III</td>
        <td colspan="2" class="lab">SBS DevOps Lab</td>
        <td class="se">SE</td>
        <td class="vc">VC/BD</td>
        <td class="wdd">WDD</td>
    </tr>

    <tr>
        <td>IV</td>
        <td class="wdd">WDD</td>
        <td class="cg">CG</td>
        <td class="vc">VC/BD</td>
        <td colspan="2" class="cyb">CybSec</td>
    </tr>

    <tr>
        <td>V</td>
        <td colspan="3" class="lab">WDD Lab</td>
        <td class="cg">CG</td>
        <td class="vc">VC/BD</td>
    </tr>

    <tr>
        <td>VI</td>
        <td class="vc">VC/BD</td>
        <td class="se">SE</td>
        <td class="cg">CG</td>
        <td colspan="2" class="lab">WDD Lab</td>
    </tr>
</table>

</body>
</html>
