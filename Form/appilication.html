<html>
<head>

    <title>Application Form</title>

    <style>

        body{
            font-family: Arial;
        }

        h1{
            text-align:center;
            color:red;
        }

        h3{
            text-align:center;
            text-decoration:underline;
        }

        table{
            margin:auto;
        }

    </style>

</head>

<body>

<h1>APPLICATION FORM</h1>

<h3>PERSONAL DETAILS</h3>

<form>

<table cellpadding="10">

<tr>
    <td>First Name</td>
    <td><input type="text"></td>

    <td>Last Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Date of Birth</td>
    <td><input type="date"></td>

    <td>Email</td>
    <td><input type="email"></td>
</tr>

<tr>
    <td>Contact</td>
    <td><input type="text"></td>

    <td>OTP</td>
    <td><input type="password"></td>
</tr>

<tr>
    <td>Address</td>
    <td colspan="3">
        <textarea rows="4" cols="40"></textarea>
    </td>
</tr>

<tr>
    <td>City</td>
    <td><input type="text"></td>

    <td>Pincode</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Gender</td>
    <td colspan="3">
        <input type="radio" name="gender"> Male
        &nbsp;&nbsp;
        <input type="radio" name="gender"> Female
    </td>
</tr>

<tr>
    <td>Programming Languages</td>
    <td colspan="3">

        <input type="checkbox"> Python <br>
        <input type="checkbox"> Java <br>
        <input type="checkbox"> JavaScript <br>
        <input type="checkbox"> Kotlin <br>
        <input type="checkbox"> Ruby <br>
        <input type="checkbox"> C#

    </td>
</tr>

<tr>
    <td>Position Applying For</td>
    <td>

        <select>
            <option>Project Manager</option>
            <option>Software Engineer</option>
            <option>Web Developer</option>
            <option>Tester</option>
        </select>

    </td>
</tr>

<tr>
    <td>Educational Qualification</td>
    <td colspan="3">

        <input type="radio" name="edu"> B.E <br>
        <input type="radio" name="edu"> B.Tech <br>
        <input type="radio" name="edu"> B.Sc <br>
        <input type="radio" name="edu"> M.Sc <br>
        <input type="radio" name="edu"> MCA <br>
        <input type="radio" name="edu"> M.E

    </td>
</tr>

<tr>
    <td>Resume</td>
    <td colspan="3">
        <input type="file">
    </td>
</tr>

<tr>
    <td colspan="4" align="center">

        <input type="submit" value="Submit">

        &nbsp;&nbsp;&nbsp;

        <input type="reset" value="Reset">

    </td>
</tr>

</table>

</form>

</body>
</html>
